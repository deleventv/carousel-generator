<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Nieuws naar Carousel</title>
  <style>
    :root {
      --bg: #fff9f9;
      --text: #333333;
      --accent: #e85d75;
      --border: #f3d9df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: #ffffff;
      line-height: 1.45;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    .sub {
      margin: 0 0 20px;
      color: #666;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    textarea,
    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: inherit;
      background: #fff;
    }

    textarea { min-height: 140px; resize: vertical; }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: #ddd;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .slide-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .slide-box h3 {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #7f4b56;
    }

    .slide-edit {
      min-height: 110px;
      font-size: 0.95rem;
    }

    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .carousel-slide {
      background: var(--bg);
      color: var(--text);
      border-radius: 18px;
      padding: clamp(20px, 6%, 34px);
      aspect-ratio: 4 / 5;
      border: 1px solid #f0e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .carousel-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .carousel-title .hl { color: var(--accent); }

    .carousel-body {
      margin-top: 18px;
      white-space: pre-wrap;
      font-size: 0.93rem;
      line-height: 1.5;
    }

    .carousel-content {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .carousel-media-space {
      flex: 1;
      min-height: 24%;
    }

    .status {
      margin-top: 10px;
      color: #666;
      font-size: 0.92rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI-nieuws naar carousel</h1>
    <p class="sub">Plak een URL of tekst, genereer 6 slides, pas ze aan en bouw een preview.</p>

    <section class="card">
      <label for="sourceInput">URL of artikeltekst</label>
      <textarea id="sourceInput" placeholder="Plak hier een link of tekst..."></textarea>

      <details style="margin-top:10px;">
        <summary>Optioneel: OpenAI API (voor echte AI-generatie)</summary>
        <div style="margin-top:10px; display:grid; gap:8px;">
          <input id="apiKey" type="password" placeholder="OpenAI API key (client-side, alleen lokaal in je browser)" />
          <input id="model" type="text" value="gpt-4.1-mini" />
        </div>
      </details>

      <div class="btn-row">
        <button id="generateBtn">Genereer voorstel</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <h2>Slides (bewerkbaar)</h2>
      <div class="grid" id="slidesEditor"></div>
      <div class="btn-row">
        <button id="buildBtn" class="secondary">Bouw carousel</button>
        <button id="downloadBtn" class="secondary">Download als PNG</button>
      </div>
      <div id="preview"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const slidesEditor = document.getElementById('slidesEditor');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');

    const generationPrompt = `Je bent een nuchtere AI-uitlegger voor een doelgroep van 40+ die AI wil begrijpen zonder hype.

Taak:
Zet een AI-nieuwsartikel of tekst om in een carousel van 6 slides.

---

Stap 1: Analyseer de input

* Haal alleen de kern eruit
* Verwijder marketing, fluff en irrelevante details
* Focus op wat er feitelijk is gebeurd

---

Stap 2: Bouw de carousel in deze vaste structuur

Slide 1: Hook

* Max 6–8 woorden
* Concreet en visueel
* Geen vage of abstracte termen
* Geen clickbait
* Maak het herkenbaar of verrassend

Slide 2: Wat is er gebeurd

* 1 korte zin + max 2 bullets
* Simpel en feitelijk

Slide 3: Hoe dit eerst ging

* Leg uit hoe dit vroeger werkte
* Maak het concreet en herkenbaar
* Max 2 korte zinnen of bullets

Slide 4: Wat er nu verandert

* Beschrijf de verbetering of verandering
* Maak het verschil met vroeger duidelijk
* Houd het simpel

Slide 5: Wat je wint (en verliest)

* Benoem voordeel én beperking
* Voeg lichte spanning toe
* Geen hype of bangmakerij

Slide 6: Wat dit echt betekent

* Reflectie op de impact
* Nuchter en realistisch
* Geen overdreven toekomstclaims

---

Stap 3: Tone of voice

* Schrijf in eenvoudig Nederlands
* Korte zinnen
* Geen vakjargon
* Geen hype-taal
* Geen overdreven claims
* Klink als een rustige, slimme gids
* Leg uit alsof je het aan iemand van 50+ uitlegt

---

Stap 4: Schrijfregels

* Max 2–3 regels per slide
* Geen lange alinea’s
* Elke slide moet in één oogopslag te begrijpen zijn
* Gebruik duidelijke, concrete woorden
* Vermijd abstracte formuleringen

---

Stap 5: Output format

Geef output exact in dit format:

Slide 1:
...

Slide 2:
...

Slide 3:
...

Slide 4:
...

Slide 5:
...

Slide 6:
...

---

Belangrijk:

* Elke slide moet één duidelijk idee bevatten
* Maak het verschil tussen vroeger en nu expliciet zichtbaar
* Zorg dat de inhoud begrijpelijk blijft voor beginners`;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    const dutchStopwords = new Set([
      'de', 'het', 'een', 'en', 'van', 'op', 'in', 'te', 'met', 'voor', 'dat', 'die', 'dit', 'is', 'zijn',
      'was', 'wordt', 'door', 'als', 'om', 'aan', 'bij', 'naar', 'uit', 'maar', 'dan', 'ook', 'nog',
      'er', 'je', 'we', 'ze', 'hun', 'ons', 'ik', 'hij', 'zij', 'u', 'tot', 'niet', 'wel', 'kan', 'kunnen'
    ]);

    function splitSentences(source) {
      return source
        .replace(/\s+/g, ' ')
        .split(/(?<=[.!?])\s+|\n+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function cropWords(text, maxWords = 16) {
      const words = text.trim().split(/\s+/).filter(Boolean);
      if (!words.length) return '';
      if (words.length <= maxWords) return words.join(' ');
      return `${words.slice(0, maxWords).join(' ')}…`;
    }

    function findSentence(sentences, patterns) {
      return sentences.find((s) => patterns.some((p) => p.test(s)));
    }

    function topKeywords(source, limit = 3) {
      const words = source
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s-]/gu, ' ')
        .split(/\s+/)
        .filter(w => w.length > 3 && !dutchStopwords.has(w));

      const counts = new Map();
      for (const word of words) {
        counts.set(word, (counts.get(word) || 0) + 1);
      }

      return [...counts.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit)
        .map(([word]) => word);
    }

    function buildStoryStructure(source) {
      const cleaned = source.replace(/\s+/g, ' ').trim();
      const sentences = splitSentences(source);
      const keywords = topKeywords(source);
      const tooShort = cleaned.length < 20 || cleaned.split(/\s+/).length < 4;
      const first = sentences[0] || cleaned;
      const second = sentences[1] || first;
      const third = sentences[2] || second;
      const last = sentences[sentences.length - 1] || first;
      const topic = keywords.length ? keywords.join(', ') : cropWords(first, 5).toLowerCase();

      return {
        tooShort,
        sourceSummary: cropWords(cleaned, 24),
        main_point: cropWords(first, 18),
        conflict: cropWords(
          findSentence(sentences, [/maar/i, /toch/i, /risico/i, /probleem/i, /zorg/i, /spann/i, /gevolg/i]) || second,
          18
        ),
        old_way: cropWords(
          findSentence(sentences, [/eerst/i, /vroeger/i, /voorheen/i, /handmatig/i, /losse/i, /traditioneel/i]) || second,
          18
        ),
        new_way: cropWords(
          findSentence(sentences, [/nu/i, /nieuw/i, /verandert/i, /automatisch/i, /sneller/i, /integreert/i]) || third,
          18
        ),
        gain_loss: cropWords(
          findSentence(sentences, [/voordeel/i, /nadeel/i, /winst/i, /verlies/i, /maar/i, /risico/i]) || `${third} ${last}`,
          20
        ),
        meaning: cropWords(
          findSentence(sentences, [/betekent/i, /impact/i, /gevolg/i, /daarom/i, /uiteindelijk/i]) || last,
          20
        ),
        topic
      };
    }

    function slidesFromStructure(structure) {
      if (structure.tooShort) {
        return [
          `Te weinig context: ${cropWords(structure.sourceSummary, 6) || 'invoer'}`,
          `Wat er gebeurde is nog onduidelijk.\nInput: "${structure.sourceSummary || 'Lege of erg korte tekst'}".`,
          `Hoe het eerst ging kunnen we niet afleiden.\nEr staat geen eerdere situatie in de input.`,
          `Wat nu verandert blijft ook vaag.\nEr is te weinig detail om een echte omslag te tonen.`,
          `Winst en verlies zijn nog niet te wegen.\nMeer feiten zijn nodig voor een eerlijke balans.`,
          `Betekenis: eerst meer context verzamelen.\nDan wordt de carousel inhoudelijk en consistent.`
        ];
      }

      return [
        `${cropWords(structure.conflict, 8)}`,
        `Wat is er gebeurd:\n${structure.main_point}.\nContext: ${cropWords(structure.sourceSummary, 12)}.`,
        `Hoe het eerst ging:\n${structure.old_way}.\nFocus lag op: ${structure.topic}.`,
        `Wat er nu verandert:\n${structure.new_way}.\nDat schuift het proces zichtbaar op.`,
        `Winst en verlies:\nWinst: ${cropWords(structure.gain_loss, 10)}.\nLet op: ${cropWords(structure.conflict, 10)}.`,
        `Wat dit echt betekent:\n${structure.meaning}.\nKernpunt: ${cropWords(structure.main_point, 10)}.`
      ];
    }

    function mergeStructure(base, patch) {
      if (!patch || typeof patch !== 'object') return base;
      const next = { ...base };
      for (const key of ['main_point', 'conflict', 'old_way', 'new_way', 'gain_loss', 'meaning']) {
        if (typeof patch[key] === 'string' && patch[key].trim()) {
          next[key] = cropWords(patch[key], 24);
        }
      }
      next.tooShort = base.tooShort;
      next.sourceSummary = base.sourceSummary;
      next.topic = base.topic;
      return next;
    }

    async function generateWithOpenAI(source, apiKey, model, baseStructure) {
      const res = await fetch('https://api.openai.com/v1/responses', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          input: [
            {
              role: 'system',
              content: `${generationPrompt}

Geef GEEN slides terug.
Geef alleen JSON met exact deze keys:
main_point, conflict, old_way, new_way, gain_loss, meaning
Elke waarde: 1 korte Nederlandse zin zonder markdown.`
            },
            {
              role: 'user',
              content: `Input:\n${source}\n\nHuidige structuur (verbeter waar nodig):\n${JSON.stringify(baseStructure)}`
            }
          ],
          temperature: 0.5
        })
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`OpenAI-fout (${res.status}): ${errText}`);
      }

      const data = await res.json();
      const text = (data.output_text || '').trim();
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        throw new Error('Model-output bevatte geen geldige structuur-JSON.');
      }
      return JSON.parse(jsonMatch[0]);
    }

    function renderEditors(values) {
      slidesEditor.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const box = document.createElement('div');
        box.className = 'slide-box';
        box.innerHTML = `
          <h3>Slide ${i + 1}</h3>
          <textarea class="slide-edit" id="slide-${i + 1}" placeholder="Slide ${i + 1}..."></textarea>
        `;
        slidesEditor.appendChild(box);
        box.querySelector('textarea').value = values?.[i] || '';
      }
    }

    function highlightOneWord(title) {
      const words = title.trim().split(/\s+/);
      if (words.length <= 1) return `<span class="hl">${title}</span>`;
      const idx = words.findIndex(w => w.length > 4);
      const target = idx >= 0 ? idx : 0;
      return words.map((w, i) => i === target ? `<span class="hl">${w}</span>` : w).join(' ');
    }

    function renderPreview() {
      preview.innerHTML = '';
      for (let i = 1; i <= 6; i++) {
        const text = document.getElementById(`slide-${i}`).value.trim();
        const lines = text.split('\n').filter(Boolean);
        const title = lines[0] || `Slide ${i}`;
        const body = lines.slice(1).join('\n');

        const slide = document.createElement('article');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
          <div class="carousel-content">
            <h3 class="carousel-title">${highlightOneWord(title)}</h3>
            <div class="carousel-body">${body}</div>
            <div class="carousel-media-space" aria-hidden="true"></div>
          </div>
        `;
        preview.appendChild(slide);
      }
    }

    let previewBuilt = false;

    async function downloadPreviewAsPng() {
      if (!preview.children.length) {
        setStatus('Nog geen preview gevonden. Klik eerst op "Bouw carousel".');
        return;
      }
      if (!previewBuilt) {
        setStatus('Preview is nog niet opgebouwd. Klik eerst op "Bouw carousel".');
        return;
      }

      setStatus('PNG-bestanden per slide worden gemaakt...');
      const slides = Array.from(preview.querySelectorAll('.carousel-slide'));

      for (let i = 0; i < slides.length; i++) {
        const exportSlide = slides[i].cloneNode(true);
        exportSlide.style.width = '1080px';
        exportSlide.style.height = '1350px';
        exportSlide.style.aspectRatio = 'auto';
        exportSlide.style.position = 'fixed';
        exportSlide.style.left = '-99999px';
        exportSlide.style.top = '0';
        exportSlide.style.margin = '0';
        document.body.appendChild(exportSlide);

        const canvas = await html2canvas(exportSlide, {
          backgroundColor: '#ffffff',
          scale: 1,
          width: 1080,
          height: 1350
        });

        exportSlide.remove();
        const link = document.createElement('a');
        link.download = `slide-${i + 1}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
      setStatus('Downloads gestart: slide-1.png t/m slide-6.png.');
    }

    document.getElementById('generateBtn').addEventListener('click', async () => {
      const source = document.getElementById('sourceInput').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value.trim() || 'gpt-4.1-mini';

      if (!source) {
        setStatus('Plak eerst een URL of tekst.');
        return;
      }

      setStatus('Voorstel wordt gegenereerd...');
      previewBuilt = false;
      preview.innerHTML = '';
      try {
        const localStructure = buildStoryStructure(source);
        let finalStructure = localStructure;

        if (apiKey) {
          const aiStructure = await generateWithOpenAI(source, apiKey, model, localStructure);
          finalStructure = mergeStructure(localStructure, aiStructure);
          setStatus('AI-voorstel gegenereerd op basis van één gedeelde inhoudsstructuur.');
        } else {
          setStatus('Voorstel gemaakt zonder API key (dynamische lokale analyse).');
        }
        const slides = slidesFromStructure(finalStructure);
        renderEditors(slides);
      } catch (err) {
        const fallbackStructure = buildStoryStructure(source);
        setStatus(`AI-generatie mislukt, lokale structuur gebruikt: ${err.message}`);
        renderEditors(slidesFromStructure(fallbackStructure));
      }
    });

    document.getElementById('buildBtn').addEventListener('click', () => {
      renderPreview();
      previewBuilt = true;
      setStatus('Carousel-preview gebouwd.');
    });

    document.getElementById('downloadBtn').addEventListener('click', downloadPreviewAsPng);

    renderEditors(Array.from({ length: 6 }, (_, i) => `Titel slide ${i + 1}\nKorte uitlegregel 1\nKorte uitlegregel 2`));
  </script>
</body>
</html>
