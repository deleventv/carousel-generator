<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Nieuws naar Carousel</title>
  <style>
    :root {
      --bg: #fff9f9;
      --text: #333333;
      --accent: #e85d75;
      --border: #f3d9df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: #ffffff;
      line-height: 1.45;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    .sub {
      margin: 0 0 20px;
      color: #666;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    textarea,
    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: inherit;
      background: #fff;
    }

    textarea { min-height: 140px; resize: vertical; }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: #ddd;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .slide-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .slide-box h3 {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #7f4b56;
    }

    .slide-edit {
      min-height: 110px;
      font-size: 0.95rem;
    }

    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .carousel-slide {
      background: var(--bg);
      color: var(--text);
      border-radius: 18px;
      padding: 26px;
      min-height: 240px;
      border: 1px solid #f0e5e5;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .carousel-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .carousel-title .hl { color: var(--accent); }

    .carousel-body {
      margin-top: 18px;
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .status {
      margin-top: 10px;
      color: #666;
      font-size: 0.92rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI-nieuws naar carousel</h1>
    <p class="sub">Plak een URL of tekst, genereer 6 slides, pas ze aan en bouw een preview.</p>

    <section class="card">
      <label for="sourceInput">URL of artikeltekst</label>
      <textarea id="sourceInput" placeholder="Plak hier een link of tekst..."></textarea>

      <details style="margin-top:10px;">
        <summary>Optioneel: OpenAI API (voor echte AI-generatie)</summary>
        <div style="margin-top:10px; display:grid; gap:8px;">
          <input id="apiKey" type="password" placeholder="OpenAI API key (client-side, alleen lokaal in je browser)" />
          <input id="model" type="text" value="gpt-4.1-mini" />
        </div>
      </details>

      <div class="btn-row">
        <button id="generateBtn">Genereer voorstel</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <h2>Slides (bewerkbaar)</h2>
      <div class="grid" id="slidesEditor"></div>
      <div class="btn-row">
        <button id="buildBtn" class="secondary">Bouw carousel</button>
        <button id="downloadBtn" class="secondary">Download als PNG</button>
      </div>
      <div id="preview"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const slidesEditor = document.getElementById('slidesEditor');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');

    const generationPrompt = `Je bent een nuchtere AI-uitlegger voor een doelgroep van 40+ die AI wil begrijpen zonder hype.

Taak:
Zet een AI-nieuwsartikel of tekst om in een carousel van 6 slides.

---

Stap 1: Analyseer de input

* Haal alleen de kern eruit
* Verwijder marketing, fluff en irrelevante details
* Focus op wat er feitelijk is gebeurd

---

Stap 2: Bouw de carousel in deze vaste structuur

Slide 1: Hook

* Max 6–8 woorden
* Concreet en visueel
* Geen vage of abstracte termen
* Geen clickbait
* Maak het herkenbaar of verrassend

Slide 2: Wat is er gebeurd

* 1 korte zin + max 2 bullets
* Simpel en feitelijk

Slide 3: Hoe dit eerst ging

* Leg uit hoe dit vroeger werkte
* Maak het concreet en herkenbaar
* Max 2 korte zinnen of bullets

Slide 4: Wat er nu verandert

* Beschrijf de verbetering of verandering
* Maak het verschil met vroeger duidelijk
* Houd het simpel

Slide 5: Wat je wint (en verliest)

* Benoem voordeel én beperking
* Voeg lichte spanning toe
* Geen hype of bangmakerij

Slide 6: Wat dit echt betekent

* Reflectie op de impact
* Nuchter en realistisch
* Geen overdreven toekomstclaims

---

Stap 3: Tone of voice

* Schrijf in eenvoudig Nederlands
* Korte zinnen
* Geen vakjargon
* Geen hype-taal
* Geen overdreven claims
* Klink als een rustige, slimme gids
* Leg uit alsof je het aan iemand van 50+ uitlegt

---

Stap 4: Schrijfregels

* Max 2–3 regels per slide
* Geen lange alinea’s
* Elke slide moet in één oogopslag te begrijpen zijn
* Gebruik duidelijke, concrete woorden
* Vermijd abstracte formuleringen

---

Stap 5: Output format

Geef output exact in dit format:

Slide 1:
...

Slide 2:
...

Slide 3:
...

Slide 4:
...

Slide 5:
...

Slide 6:
...

---

Belangrijk:

* Elke slide moet één duidelijk idee bevatten
* Maak het verschil tussen vroeger en nu expliciet zichtbaar
* Zorg dat de inhoud begrijpelijk blijft voor beginners`;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function splitToSlides(text) {
      const out = Array.from({ length: 6 }, () => '');
      const regex = /Slide\s*(\d)\s*:\s*([\s\S]*?)(?=\n\s*Slide\s*\d\s*:|$)/gi;
      let match;
      while ((match = regex.exec(text)) !== null) {
        const i = Number(match[1]) - 1;
        if (i >= 0 && i < 6) out[i] = match[2].trim();
      }
      return out;
    }

    function fallbackGenerate(source) {
      const short = source.replace(/\s+/g, ' ').trim().slice(0, 260);
      const core = short || 'Nieuwe AI-update uit het nieuws';
      return [
        'AI schuift stil je werkdag in',
        `Kort nieuws: ${core}.\n- Feit: er is een nieuwe stap gezet\n- Effect: mensen merken dit sneller`,
        'Eerst deed je dit met losse tools.\nOf handmatig, stap voor stap.',
        'Nu zit meer in één flow.\nDat scheelt klikken en wachttijd.',
        'Winst: sneller klaar en minder gedoe.\nVerlies: je moet output blijven controleren.',
        'Dit is geen wondermiddel.\nWel een praktische verschuiving in hoe we werken.'
      ];
    }

    async function generateWithOpenAI(source, apiKey, model) {
      const res = await fetch('https://api.openai.com/v1/responses', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          input: [
            {
              role: 'system',
              content: generationPrompt
            },
            {
              role: 'user',
              content: `Input:\n${source}`
            }
          ],
          temperature: 0.5
        })
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`OpenAI-fout (${res.status}): ${errText}`);
      }

      const data = await res.json();
      const text = data.output_text || '';
      return splitToSlides(text);
    }

    function renderEditors(values) {
      slidesEditor.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const box = document.createElement('div');
        box.className = 'slide-box';
        box.innerHTML = `
          <h3>Slide ${i + 1}</h3>
          <textarea class="slide-edit" id="slide-${i + 1}" placeholder="Slide ${i + 1}..."></textarea>
        `;
        slidesEditor.appendChild(box);
        box.querySelector('textarea').value = values?.[i] || '';
      }
    }

    function highlightOneWord(title) {
      const words = title.trim().split(/\s+/);
      if (words.length <= 1) return `<span class="hl">${title}</span>`;
      const idx = words.findIndex(w => w.length > 4);
      const target = idx >= 0 ? idx : 0;
      return words.map((w, i) => i === target ? `<span class="hl">${w}</span>` : w).join(' ');
    }

    function renderPreview() {
      preview.innerHTML = '';
      for (let i = 1; i <= 6; i++) {
        const text = document.getElementById(`slide-${i}`).value.trim();
        const lines = text.split('\n').filter(Boolean);
        const title = lines[0] || `Slide ${i}`;
        const body = lines.slice(1).join('\n');

        const slide = document.createElement('article');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
          <div>
            <h3 class="carousel-title">${highlightOneWord(title)}</h3>
            <div class="carousel-body">${body}</div>
          </div>
          <small>Slide ${i}/6</small>
        `;
        preview.appendChild(slide);
      }
    }

    async function downloadPreviewAsPng() {
      if (!preview.children.length) {
        setStatus('Bouw eerst de carousel-preview.');
        return;
      }
      setStatus('PNG wordt gemaakt...');
      const canvas = await html2canvas(preview, { backgroundColor: '#ffffff', scale: 2 });
      const link = document.createElement('a');
      link.download = 'carousel-preview.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      setStatus('Download gestart.');
    }

    document.getElementById('generateBtn').addEventListener('click', async () => {
      const source = document.getElementById('sourceInput').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value.trim() || 'gpt-4.1-mini';

      if (!source) {
        setStatus('Plak eerst een URL of tekst.');
        return;
      }

      setStatus('Voorstel wordt gegenereerd...');
      try {
        let slides;
        if (apiKey) {
          slides = await generateWithOpenAI(source, apiKey, model);
          if (slides.every(s => !s)) {
            throw new Error('Model-output kon niet worden gelezen als 6 slides.');
          }
          setStatus('AI-voorstel gegenereerd. Je kunt alles aanpassen.');
        } else {
          slides = fallbackGenerate(source);
          setStatus('Voorstel gemaakt zonder API key (simpele lokale fallback).');
        }
        renderEditors(slides);
      } catch (err) {
        setStatus(`Generatie mislukt: ${err.message}`);
        renderEditors(fallbackGenerate(source));
      }
    });

    document.getElementById('buildBtn').addEventListener('click', () => {
      renderPreview();
      setStatus('Carousel-preview gebouwd.');
    });

    document.getElementById('downloadBtn').addEventListener('click', downloadPreviewAsPng);

    renderEditors(Array.from({ length: 6 }, (_, i) => `Titel slide ${i + 1}\nKorte uitlegregel 1\nKorte uitlegregel 2`));
  </script>
</body>
</html>
